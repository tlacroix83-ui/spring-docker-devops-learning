name: CI

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "docs/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: "temurin"

    - name: Make mvnw executable
      run: chmod +x ./mvnw

    - name: Test with Maven
      run: ./mvnw clean test

    - name: Build with Maven
      run: ./mvnw clean package -DskipTests
      
    - name: Build Docker image for Kubernetes
      run: docker build -t todo-api:local .

    - name: Build and run Docker Compose
      run: docker compose -f docker-compose.yml up --build -d

    - name: Make scripts executable
      run: chmod +x ./scripts/*.sh

    - name: Wait for API to be ready
      run: ./scripts/wait-for-api.sh

    - name: Test API
      run: ./scripts/test-api.sh

    - name: Create Kubernetes cluster with kind
      uses: helm/kind-action@v1
      with:
        cluster_name: ci-cluster

    - name: Check kind clusters
      run: |
        kind get clusters
        kubectl config current-context

    - name: Load Docker images into kind cluster
      run: |
        kind load docker-image todo-api:local --name ci-cluster
        kind load docker-image postgres:16 --name ci-cluster

    - name: Apply Kubernetes manifests
      run: kubectl apply -f k8s/

    - name: Rollout status of deployments
      run: |
        kubectl rollout status deployment/todo-api-deployment
        kubectl rollout status deployment/postgres-deployment

    - name: Check Kubernetes resources
      run: |
        kubectl get pods
        kubectl get svc

    - name: Validate Kubernetes manifests
      run: |
        echo "Validating Kubernetes manifests..."
        kubectl apply --dry-run=client --validate=false -f k8s/
        echo "Kubernetes manifests are valid"

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Push Docker to GitHub Container Registry
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ghcr.io/${{ github.repository }}:${{ github.sha }}
        
    - name: Stop Docker Compose
      if: always()
      run: docker compose -f docker-compose.yml down